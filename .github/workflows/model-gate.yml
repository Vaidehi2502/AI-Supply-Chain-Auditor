name: Model Gate

# Scans AI model files added or changed in a pull request.
# DANGER  -> job fails -> red X -> merge blocked.
# WARNING/SAFE -> job passes -> green check.
# Findings are posted back as a PR comment either way.

on:
  pull_request:
    paths:
      - '**.pkl'
      - '**.pt'
      - '**.pth'
      - '**.bin'
      - '**.safetensors'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Find changed model files
        id: changed
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            git fetch origin "$BASE_REF" --depth=1 || true
            RANGE="origin/$BASE_REF...HEAD"
          else
            RANGE="HEAD~1...HEAD"
          fi
          FILES=$(git diff --name-only --diff-filter=AM "$RANGE" 2>/dev/null | grep -E '\.(pkl|pt|pth|bin|safetensors)$' || true)
          if [ -z "$FILES" ]; then
            FILES=$(git ls-files | grep -E '\.(pkl|pt|pth|bin|safetensors)$' || true)
          fi
          echo "Files to scan: $FILES"
          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Model Gate
        id: gate
        env:
          FILES: ${{ steps.changed.outputs.files }}
        run: |
          set +e
          python scripts/gate_report.py $FILES
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Model Gate scan results\n\n(no report generated)';
            try { body = fs.readFileSync('scan_report.md', 'utf8'); } catch (e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Enforce gate
        if: steps.gate.outputs.exit_code != '0'
        run: |
          echo "::error::Model Gate blocked this PR — a dangerous model was detected."
          exit 1
